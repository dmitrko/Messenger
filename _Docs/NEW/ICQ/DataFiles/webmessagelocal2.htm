<html>
<head>
<title>ICQ.com</title>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
<script language="JavaScript">
	<!--
	function fill(){
		HoldDate=new Date();
		est_date = HoldDate.getDate() + "-" + (HoldDate.getMonth()+1) + "-" + HoldDate.getYear();
		if(document.referrer == null || document.referrer == "") {
		document.weberror.referrer.value = "Unknown";
		} else {
		document.weberror.referrer.value = document.referrer;
		}
		document.weberror.request.value = location.href;			
		return false
		}		
	//-->
</script>
</head>
<body topmargin="0" leftmargin="0" rightmargin="0" bottommargin="0" scroll="no" onLoad="fill()">
<div style="height:37px;background-image: url(pixel.gif); background-position: top; background-repeat: repeat-x;"><div style="float:left; width:151px;"><img src="logo.gif" width="151" height="37" border="0"></div></div>
<center>
<div style="width:390px;margin-top:100px">
	<div style="width:390px;height:19px"><img src="top.gif" width="390" height="19" border="0"></div>
	<div style="width:390px;FILTER: progid:DXImageTransform.Microsoft.Gradient(gradientType=0,startColorStr=#FBFCFE,endColorStr=#DDE6F3); border-left:1px solid #999DA5; border-right:1px solid #999DA5">		
		<div style="width:79px;height:92px;float:left;margin-left:7px;padding-top:10px;"><img src="icon.gif" width="79" height="72" border="0"></div>
		<div style="height:72px;text-align:center;padding-top:15px;margin-right:10px;">
			<span style="font-family:Tahoma; font-weight:bold; font-size:14px; color:#990033">We are sorry,</span><br><span style="font-family:Tahoma; font-weight:bold; font-size:12px; color:#003399;">**WEBMESSAGESTRING**</span>
			<form action="http://web.icq.com/mail_sender/" method="post" name="weberror" style="margin-bottom:0px;margin-top:0px">
			<input type=hidden name="template_name" value="Mail Template - webmsgerror">
			<input type="hidden" name="success_url" value="http://web.icq.com/client/webmessage/success/">
			<input type="hidden" name="failure_url" value="http://web.icq.com/client/webmessage/failure/">
			<input type="hidden" name="error_code" value="**WEBMESSAGESTRING**">
			<input type="hidden" name="referrer">
			<input type="hidden" name="request">
			<input type="hidden" name="est_date">
			<span style="font-family:Tahoma; font-weight:bold; font-size:12px; color:#003399">Please submit these details to our webmaster</span><br><br>
			<input type="submit" style="color: #003399;  font-family: Tahoma, Verdana, Arial;  font-weight: bold;FILTER: progid:DXImageTransform.Microsoft.Gradient(gradientType=0,startColorStr=#FBFCFE,endColorStr=#DDE6F3);" value="Submit">
			</form>
		
		
			<!--<span style="font-family:Tahoma; font-weight:bold; font-size:14px; color:#990033">We are sorry,</span><br>
			<span style="font-family:Tahoma; font-weight:bold; font-size:12px; color:#003399">There is currently a problem dispalying<br>this ICQ Web message.</span>
			-->
		</div>
	</div>
	<div style="width:390px;height:19px"><img src="bottom.gif" width="390" height="19" border="0"></div>
</div>
</center>
</body>
</html>
